repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: [src/forge, --no-strict-optional, --ignore-missing-imports]
        pass_filenames: false
        additional_dependencies: [pydantic>=2.0, pydantic-settings>=2.0, fastapi>=0.110]
        verbose: true
        stages: [manual]
