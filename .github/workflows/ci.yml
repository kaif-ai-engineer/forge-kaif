name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache uv environment
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ci-lint-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ci-lint-

      - name: Install dependencies
        run: uv pip install --system -e ".[all,dev]"

      - name: Check formatting
        run: ruff format --check .

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy src/forge

  test:
    name: Tests (Python ${{ matrix.python-version }})
    needs: [lint]
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache uv environment
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ci-test-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ci-test-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install dependencies
        run: uv pip install --system -e ".[all,dev]"

      - name: Run unit tests
        run: pytest tests/unit --timeout=30 -v --cov=forge --cov-report=xml

      - name: Run integration tests
        run: pytest tests/integration --timeout=60 -v
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

  build:
    name: Build package
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: uv pip install --system hatch

      - name: Build distributions
        run: hatch build

      - name: Verify wheel installs
        run: uv pip install --system dist/*.whl
