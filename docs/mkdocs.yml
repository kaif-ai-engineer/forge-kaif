site_name: forge
site_description: The developer runtime for AI-era Python.
site_url: https://useforge.dev
repo_url: https://github.com/forge-runtime/forge
edit_uri: edit/main/docs/docs/

theme:
  name: material
  palette:
    primary: indigo
    accent: amber
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed
  - admonition
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [../../src]

nav:
  - Home: index.md
  - Getting Started: getting-started/
  - Modules:
      - Config: modules/config.md
      - Logging: modules/log.md
      - Retry: modules/retry.md
      - AI: modules/ai.md
      - Health: modules/health.md
      - Cache: modules/cache.md
      - Validation: modules/validation.md
  - Guides:
      - Using with FastAPI: guides/fastapi.md
      - Testing: guides/testing.md
      - Production Deployment: guides/deployment.md
  - API Reference: api/
  - FAQ: faq.md
